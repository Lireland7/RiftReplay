<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RiftReplay</title>
<style>
  /* Utility overlay: legible at a glance mid-game, quiet enough to ignore.
     One signature element: the depletion bar under each card row. */
  :root {
    --bg: rgba(13, 16, 23, 0.92);
    --ink: #e8eaf0;
    --dim: #8b93a7;
    --gold: #c9a227;       /* Riftbound card-frame gold */
    --drawn: #4a5268;
    --bar: #2dd4a7;
    --bar-low: #e0564b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; height: 100%; overflow: hidden; }
  body {
    font: 13px/1.45 "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
  }
  #panel {
    background: var(--bg);
    border: 1px solid rgba(201, 162, 39, 0.35);
    border-radius: 10px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(6px);
  }
  header {
    -webkit-app-region: drag;          /* drag the frameless window */
    padding: 10px 14px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    cursor: move;
  }
  header h1 {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  #champion { color: var(--dim); font-size: 12px; margin-top: 2px; }
  #stats {
    display: flex;
    gap: 14px;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-variant-numeric: tabular-nums;
  }
  #stats .stat b { font-size: 16px; display: block; }
  #stats .stat span { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
  #cards { flex: 1; overflow-y: auto; padding: 6px 0; }
  #cards::-webkit-scrollbar { width: 6px; }
  #cards::-webkit-scrollbar-thumb { background: #2a3040; border-radius: 3px; }
  .row {
    padding: 5px 14px 7px;
    position: relative;
  }
  .row .line {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-variant-numeric: tabular-nums;
  }
  .row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .count b { color: var(--ink); }
  .row .count i { color: var(--dim); font-style: normal; }
  .row .odds { color: var(--dim); width: 44px; text-align: right; }
  .row.empty .name, .row.empty .count { color: var(--drawn); text-decoration: line-through; }
  .section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px 4px;
    margin-top: 4px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #e0984b;
  }
  .section-head .count { color: var(--dim); }
  .row.recycled .name { color: #e0984b; }
  .row.recycled .count b { color: #e0984b; }
  .row.recycled .name.unknown { font-style: italic; color: var(--dim); }
  .layer-note {
    padding: 4px 14px 2px;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--dim);
  }
  /* Cards grouped in one randomized layer share a left rail. */
  .row.in-layer { border-left: 2px solid rgba(224,152,75,0.45); padding-left: 12px; }
  .bar { height: 2px; margin-top: 4px; background: #232838; border-radius: 1px; overflow: hidden; }
  .bar i { display: block; height: 100%; background: var(--bar); transition: width .25s ease; }
  .bar i.low { background: var(--bar-low); }
  .flash { animation: flash 0.7s ease; }
  @keyframes flash { 0% { background: rgba(201,162,39,0.22); } 100% { background: transparent; } }
  #waiting { padding: 22px 14px; color: var(--dim); text-align: center; }
  @media (prefers-reduced-motion: reduce) { .flash { animation: none; } .bar i { transition: none; } }
</style>
</head>
<body>
<div id="panel">
  <header>
    <h1>RiftReplay</h1>
    <div id="champion">Waiting for game…</div>
  </header>
  <div id="stats" hidden>
    <div class="stat"><b id="remaining">0</b><span>in deck</span></div>
    <div class="stat"><b id="drawn">0</b><span>drawn</span></div>
  </div>
  <div id="cards">
    <div id="waiting">Open TCG Arena and load a deck.<br>The tracker fills in automatically.</div>
  </div>
</div>

<script>
  // name -> { total, drawn }
  let deck = new Map();
  // Bottom-of-deck layers (one per recycle event), in draw order. Each:
  // { named: [{name,count}], anonymous: <count> }. `recycled` is the aggregate
  // name->count across all layers, used for per-card draw-pool math.
  let recycledLayers = [];
  let recycled = new Map();
  let recycledAnonymous = 0;
  // Authoritative remaining count read from the game's own ".deck" UI. This is
  // the source of truth for "in deck" — the per-card Map is only the breakdown,
  // and can lag when a drawn card isn't individually identified.
  let gameRemaining = null;

  const $ = id => document.getElementById(id);

  // Escape card names before interpolating into innerHTML — names come from the
  // external card DB / game DOM, so treat them as untrusted to avoid XSS.
  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  function deckRemaining() {
    let r = 0;
    for (const v of deck.values()) r += v.total - v.drawn;
    return r;
  }
  function deckDrawn() {
    let d = 0;
    for (const v of deck.values()) d += v.drawn;
    return d;
  }
  function totalRecycled() {
    let n = recycledAnonymous;
    for (const v of recycled.values()) n += v;
    return n;
  }

  // Apply a recycled payload from the game: { layers, named, anonymous, total }.
  function applyRecycle(p) {
    recycledLayers = p?.layers ?? [];
    recycled = new Map((p?.named ?? []).map(r => [r.name, r.count]));
    recycledAnonymous = p?.anonymous ?? 0;
  }

  function render(flashName) {
    // "In deck" uses the game's authoritative count when we have it; otherwise
    // fall back to the per-card Map sum (e.g. before the first deck-count event).
    const shownRemaining = gameRemaining ?? deckRemaining();
    const recycledTotal = totalRecycled();
    // Effective draw pool: cards in deck excluding those stuck at the bottom.
    const drawPool = Math.max(0, shownRemaining - recycledTotal);

    $('remaining').textContent = shownRemaining;
    $('drawn').textContent = deckDrawn();
    $('stats').hidden = deck.size === 0;

    // Main list: drawable copies only (cards parked at the bottom are listed in
    // their own section below and excluded from these counts/odds).
    const rows = [...deck.entries()]
      .sort((a, b) => a[0].localeCompare(b[0]))
      .map(([name, v]) => {
        const left = v.total - v.drawn;
        const atBottom = recycled.get(name) ?? 0;
        const drawable = Math.max(0, left - atBottom);
        const isEmpty = drawable === 0;

        const odds = (!isEmpty && drawPool > 0)
          ? Math.round((drawable / drawPool) * 100) + '%'
          : '—';
        const pct = v.total > 0 ? (drawable / v.total) * 100 : 0;
        const cls = [isEmpty ? 'empty' : '', name === flashName ? 'flash' : '']
          .filter(Boolean).join(' ');

        return `
          <div class="row ${cls}">
            <div class="line">
              <span class="name">${esc(name)}</span>
              <span class="count"><b>${drawable}</b><i>/${v.total}</i></span>
              <span class="odds">${odds}</span>
            </div>
            <div class="bar"><i class="${pct <= 34 ? 'low' : ''}" style="width:${pct}%"></i></div>
          </div>`;
      });

    // Bottom-of-deck section: one group per recycle layer, in draw order (the
    // earliest-recycled layer is drawn first once the deck cycles down). Cards
    // within a layer were bottomed together and are in random order.
    if (recycledTotal > 0) {
      rows.push(`
        <div class="section-head">
          <span>Bottom of deck</span><span class="count">${recycledTotal}</span>
        </div>`);
      recycledLayers.forEach((layer, i) => {
        const size = (layer.named ?? []).reduce((s, c) => s + c.count, 0) + (layer.anonymous || 0);
        // Multi-card layers are randomized — label them so the order is clear.
        if (size > 1) {
          rows.push(`<div class="layer-note">Layer ${i + 1} · ${size} cards, random order</div>`);
        }
        const cls = size > 1 ? 'row recycled in-layer' : 'row recycled';
        for (const c of (layer.named ?? []).slice().sort((a, b) => a.name.localeCompare(b.name))) {
          rows.push(`
            <div class="${cls}">
              <div class="line">
                <span class="name">${esc(c.name)}</span>
                <span class="count"><b>${c.count}</b></span>
                <span class="odds">↓</span>
              </div>
            </div>`);
        }
        if (layer.anonymous > 0) {
          rows.push(`
            <div class="${cls}">
              <div class="line">
                <span class="name unknown">Unknown</span>
                <span class="count"><b>${layer.anonymous}</b></span>
                <span class="odds">↓</span>
              </div>
            </div>`);
        }
      });
    }

    $('cards').innerHTML = rows.join('') || '<div id="waiting">No deck loaded yet.</div>';
  }

  window.tracker.onEvent(evt => {
    switch (evt.type) {
      case 'deck-snapshot': {
        deck = new Map(evt.data.deck.map(c => [c.name, { total: c.total, drawn: c.drawn }]));
        applyRecycle(null);
        gameRemaining = null; // will be set by the next deck-count event
        $('champion').textContent = evt.data.champion
          ? `Champion: ${evt.data.champion}` : 'Deck loaded';
        render();
        break;
      }
      case 'card-drawn': {
        const e = deck.get(evt.data.name);
        if (e && e.drawn < e.total) e.drawn += 1;
        // Recycled state is authoritative from the game (arrives via deck-count /
        // recycled-update), so we don't mutate it here.
        render(evt.data.name);
        break;
      }
      case 'recycled-update': {
        applyRecycle(evt.data);
        render();
        break;
      }
      case 'recycle-cleared': {
        applyRecycle(null);
        render();
        break;
      }
      case 'deck-count': {
        // Authoritative remaining count from the game's own ".deck" UI.
        gameRemaining = evt.data.remaining;
        if (evt.data.recycled) applyRecycle(evt.data.recycled);
        $('stats').hidden = false;
        render();
        break;
      }
      case 'log-drew':
      case 'log-played':
        break;
    }
  });
</script>
</body>
</html>
